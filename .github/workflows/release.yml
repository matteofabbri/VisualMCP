name: release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: release (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained, ${{ matrix.rid }})
        run: dotnet publish src/VisualMCP/VisualMCP.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o out/${{ matrix.rid }}

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path out/${{ matrix.rid }}/* -DestinationPath VisualMCP-${{ matrix.rid }}.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: VisualMCP-${{ matrix.rid }}.zip
