name: build

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/VisualMCP/VisualMCP.csproj

      - name: Build
        run: dotnet build src/VisualMCP/VisualMCP.csproj -c Release --no-restore

      - name: Publish (${{ matrix.rid }})
        run: dotnet publish src/VisualMCP/VisualMCP.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisualMCP-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}
